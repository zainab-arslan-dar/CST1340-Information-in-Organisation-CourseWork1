<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <style>
        body {
            font-family: myFont1;
            text-align: center;
            padding: 40px;
            background-color: #ffe5e7;
        }
        .message {
            text-align: center;
            color: #B1A2CA;
            font-size: 32px;
            margin: 40px 0 20px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            letter-spacing: 2px;
            position: relative;
}
        .button {
		display: block;
        width: 200px;
        margin: 20px auto;
        padding: 12px;
        font-size: 18px;
        text-align: center;
        background-color: #5a3e5f;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
        letter-spacing: 1px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
		font-family: myFont1;
}

        .button:hover {
            background-color:  #5a3e5f;
        }
    </style>
</head>
<body>
    <div class="message">Account has been created successfully!</div>
    <a href="index.html"><button class="button">Back to Home Page</button></a>
</body>
</html>
